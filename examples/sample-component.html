<!--
  Button Component — generated by /generate-component button
  Project: Storefront UI (Vanilla HTML + CSS)

  Variants: primary, secondary, ghost, destructive
  Sizes: sm, md, lg
  States: default, hover, focus, active, disabled

  Token references:
    Colors:  --color-primary, --color-primary-hover, --color-text-on-primary
             --color-secondary, --color-surface, --color-text
             --color-destructive, --color-destructive-hover
             --color-border, --color-focus-ring
    Spacing: --spacing-xs, --spacing-sm, --spacing-md
    Type:    --font-size-sm, --font-size-md, --font-weight-medium
    Radius:  --radius-sm
-->

<!-- ============================================================
     MARKUP EXAMPLES
     ============================================================ -->

<!-- Primary (default) -->
<button class="btn btn--primary">Save changes</button>

<!-- Primary, small -->
<button class="btn btn--primary btn--sm">Save</button>

<!-- Primary, large -->
<button class="btn btn--primary btn--lg">Create account</button>

<!-- Secondary -->
<button class="btn btn--secondary">Cancel</button>

<!-- Ghost -->
<button class="btn btn--ghost">Learn more</button>

<!-- Destructive -->
<button class="btn btn--destructive">Delete item</button>

<!-- Disabled state — works on any variant -->
<button class="btn btn--primary" disabled>Save changes</button>

<!-- With leading icon (icon is decorative, aria-hidden) -->
<button class="btn btn--primary">
  <svg class="btn__icon" aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16">
    <path d="M13.5 2.5L6 10 2.5 6.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Confirm
</button>

<!-- Icon-only button (requires aria-label) -->
<button class="btn btn--ghost btn--icon-only" aria-label="Close dialog">
  <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16">
    <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</button>


<!-- ============================================================
     STYLES
     ============================================================ -->
<style>
/* ---- Base ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-xs);

  padding: var(--spacing-sm) var(--spacing-md);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);

  font-size: var(--font-size-md);
  font-weight: var(--font-weight-medium);
  font-family: inherit;
  line-height: 1;
  white-space: nowrap;
  text-decoration: none;

  cursor: pointer;
  user-select: none;
  transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

/* ---- Focus (applies to all variants) ---- */
.btn:focus-visible {
  outline: 2px solid var(--color-focus-ring);
  outline-offset: 2px;
}

/* ---- Disabled (applies to all variants) ---- */
.btn:disabled,
.btn[aria-disabled="true"] {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}

/* ---- Primary ---- */
.btn--primary {
  background-color: var(--color-primary);
  border-color: var(--color-primary);
  color: var(--color-text-on-primary);
}

.btn--primary:hover:not(:disabled) {
  background-color: var(--color-primary-hover);
  border-color: var(--color-primary-hover);
}

.btn--primary:active:not(:disabled) {
  background-color: var(--color-primary-hover);
  transform: translateY(1px);
}

/* ---- Secondary ---- */
.btn--secondary {
  background-color: var(--color-surface);
  border-color: var(--color-border);
  color: var(--color-text);
}

.btn--secondary:hover:not(:disabled) {
  background-color: var(--color-surface-hover);
  border-color: var(--color-border-hover);
}

.btn--secondary:active:not(:disabled) {
  background-color: var(--color-surface-hover);
  transform: translateY(1px);
}

/* ---- Ghost ---- */
.btn--ghost {
  background-color: transparent;
  border-color: transparent;
  color: var(--color-primary);
}

.btn--ghost:hover:not(:disabled) {
  background-color: var(--color-primary-subtle);
}

.btn--ghost:active:not(:disabled) {
  background-color: var(--color-primary-subtle);
  transform: translateY(1px);
}

/* ---- Destructive ---- */
.btn--destructive {
  background-color: var(--color-destructive);
  border-color: var(--color-destructive);
  color: var(--color-text-on-primary);
}

.btn--destructive:hover:not(:disabled) {
  background-color: var(--color-destructive-hover);
  border-color: var(--color-destructive-hover);
}

.btn--destructive:active:not(:disabled) {
  background-color: var(--color-destructive-hover);
  transform: translateY(1px);
}

/* ---- Sizes ---- */
.btn--sm {
  padding: var(--spacing-xs) var(--spacing-sm);
  font-size: var(--font-size-sm);
  min-height: 32px;
}

.btn--md {
  min-height: 40px; /* default */
}

.btn--lg {
  padding: var(--spacing-sm) var(--spacing-lg);
  font-size: var(--font-size-lg);
  min-height: 48px;
}

/* ---- Icon ---- */
.btn__icon {
  flex-shrink: 0;
  width: 1em;
  height: 1em;
}

/* ---- Icon-only ---- */
.btn--icon-only {
  padding: var(--spacing-sm);
  aspect-ratio: 1;
  min-width: 40px;
  min-height: 40px; /* Meets 44px touch target with typical padding */
}

.btn--icon-only.btn--sm {
  min-width: 32px;
  min-height: 32px;
  padding: var(--spacing-xs);
}
</style>
